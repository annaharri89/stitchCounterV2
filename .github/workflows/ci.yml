name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Source and test parity check
        run: bash scripts/check-source-test-parity.sh origin/${{ github.base_ref || 'main' }}

      - name: Run debug unit tests
        run: ./gradlew :app:testDebugUnitTest
