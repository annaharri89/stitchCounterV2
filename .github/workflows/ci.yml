name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run debug unit tests with coverage
        id: gradle_unit_tests
        continue-on-error: true
        run: ./gradlew :app:koverXmlReportDebug

      - name: Publish coverage summary
        if: always() && !cancelled()
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import os

          report_path = Path("app/build/reports/kover/reportDebug.xml")
          if not report_path.exists():
              candidates = sorted(Path("app/build/reports/kover").rglob("*.xml"))
              if not candidates:
                  raise FileNotFoundError("No Kover XML coverage report found under app/build/reports/kover")
              report_path = candidates[0]

          root = ET.parse(report_path).getroot()
          line_counter = root.find("./counter[@type='LINE']")
          if line_counter is None:
              raise RuntimeError("Could not find LINE counter in Kover XML report")

          covered = int(line_counter.attrib["covered"])
          missed = int(line_counter.attrib["missed"])
          total = covered + missed
          percent = (covered / total * 100.0) if total else 0.0
          rounded = f"{percent:.2f}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(f"line_coverage_percent={rounded}\n")
              output_file.write(f"coverage_report_path={report_path}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary_file:
              summary_file.write("## JVM unit test coverage\n")
              summary_file.write(f"- Line coverage: **{rounded}%**\n")
              summary_file.write(f"- Covered lines: {covered}\n")
              summary_file.write(f"- Missed lines: {missed}\n")
              summary_file.write(f"- Report: `{report_path}`\n")
          PY

      - name: Collect JUnit XML paths for Codecov
        id: junit_xml
        if: always() && !cancelled()
        shell: bash
        run: |
          junit_dir="app/build/test-results/testDebugUnitTest"
          if [ ! -d "$junit_dir" ]; then
            echo "has_junit_xml=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t paths < <(find "$junit_dir" -maxdepth 1 -name 'TEST-*.xml' -type f | sort)
          if [ ${#paths[@]} -eq 0 ]; then
            echo "has_junit_xml=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_junit_xml=true" >> "$GITHUB_OUTPUT"
          joined=$(printf '%s,' "${paths[@]}")
          echo "file_list=${joined%,}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage reports to Codecov
        if: always() && !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && hashFiles('app/build/reports/kover/reportDebug.xml') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/build/reports/kover/reportDebug.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: always() && !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.junit_xml.outputs.has_junit_xml == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          name: junit-debug-unit-test
          files: ${{ steps.junit_xml.outputs.file_list }}
          disable_search: true
          fail_ci_if_error: false
          verbose: true

      - name: Fail if unit tests did not pass
        if: steps.gradle_unit_tests.outcome == 'failure'
        run: exit 1
